        - Public - Translations
      summary: Libellés des commandes
      responses:
        '200':
          description: Libellés

  # ========== USER PREFERENCES ROUTES ==========
  /api/user/preferences/language:
    get:
      tags:
        - User Preferences
      summary: Langue préférée
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Langue préférée

    post:
      tags:
        - User Preferences
      summary: Mettre à jour la langue préférée
      security:
        - bearerAuth: []
      parameters:
        - name: lang
          in: query
          required: true
          schema:
            type: string
            enum: [en, fr]
      responses:
        '200':
          description: Langue mise à jour

  # ========== CLIENT PROFILE ROUTES ==========
  /api/client/profile/me:
    get:
      tags:
        - Client - Profile
      summary: Profil utilisateur
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil utilisateur

    put:
      tags:
        - Client - Profile
      summary: Mettre à jour profil utilisateur
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Profil mis à jour

  /api/client/profile/client:
    get:
      tags:
        - Client - Profile
      summary: Profil client
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil client

    put:
      tags:
        - Client - Profile
      summary: Mettre à jour profil client
      security:
        - bearerAuth: []
      requestBody:
