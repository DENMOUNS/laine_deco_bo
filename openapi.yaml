          description: Liste des catégories

  /api/public/sidebar/brands:
    get:
      tags:
        - Public - Sidebar
      summary: Marques disponibles
      responses:
        '200':
          description: Liste des marques

  /api/public/sidebar/stats:
    get:
      tags:
        - Public - Sidebar
