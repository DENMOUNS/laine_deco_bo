  # ========== TRANSLATIONS ROUTES ==========
  /api/public/translations/current-language:
    get:
      tags:
        - Public - Translations
      summary: Langue actuelle
      responses:
        '200':
          description: Langue

  /api/public/translations/supported-languages:
    get:
      tags:
        - Public - Translations
      summary: Langues supportées
      responses:
        '200':
          description: Langues

  /api/public/translations/product-labels:
    get:
      tags:
        - Public - Translations
      summary: Libellés des produits
      responses:
        '200':
