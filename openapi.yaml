          description: Promotions de la catégorie

  /api/public/promotions/brand/{brand}:
    get:
      tags:
        - Public - Promotions
      summary: Promotions par marque
      parameters:
        - name: brand
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promotions de la marque

  /api/public/promotions/product/{productId}:
    get:
      tags:
        - Public - Promotions
      summary: Promotions pour un produit
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Promotions du produit

  # ========== PUBLIC PRODUCT PACKS ROUTES ==========
  /api/public/product-packs:
    get:
      tags:
        - Public - Product Packs
      summary: Lister les packs
      responses:
        '200':
          description: Liste des packs

  /api/public/product-packs/{packId}:
    get:
      tags:
        - Public - Product Packs
      summary: Détails d'un pack
      parameters:
        - name: packId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Détails du pack

  /api/public/product-packs/search:
    get:
      tags:
        - Public - Product Packs
      summary: Rechercher un pack
      parameters:
        - name: search
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Résultats de recherche

  /api/public/product-packs/promotions:
    get:
      tags:
        - Public - Product Packs
      summary: Packs en promotion
      responses:
        '200':
          description: Packs en promotion

  /api/public/product-packs/product/{productId}:
    get:
      tags:
        - Public - Product Packs
      summary: Packs contenant un produit
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Packs du produit

  # ========== PUBLIC ORDER ROUTES ==========
  /api/public/orders:
    post:
      tags:
        - Public - Orders
      summary: Créer une commande (invité)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Commande créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

  /api/public/order-tracking/by-number/{orderNumber}:
    get:
      tags:
        - Public - Order Tracking
      summary: Suivi commande par numéro
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Suivi de la commande

  /api/public/order-tracking/by-id/{orderId}:
    get:
      tags:
        - Public - Order Tracking
      summary: Suivi commande par ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Suivi de la commande

  # ========== PUBLIC NEWSLETTER ROUTES ==========
  /api/public/newsletter/subscribe:
    post:
      tags:
        - Public - Newsletter
      summary: S'abonner à la newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '201':
          description: Abonnement créé

  /api/public/newsletter/unsubscribe/{email}:
    post:
      tags:
        - Public - Newsletter
      summary: Se désabonner
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Désabonnement réussi

  /api/public/newsletter/resubscribe/{email}:
    post:
      tags:
        - Public - Newsletter
      summary: Se réabonner
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Réabonnement réussi

  /api/public/newsletter/check/{email}:
    get:
      tags:
        - Public - Newsletter
      summary: Vérifier statut d'abonnement
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Statut d'abonnement

  # ========== PUBLIC MAINTENANCE GUIDES ROUTES ==========
  /api/public/maintenance-guides:
    get:
      tags:
        - Public - Maintenance Guides
      summary: Lister les guides d'entretien
      responses:
