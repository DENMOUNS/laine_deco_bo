      summary: À propos de nous
      responses:
        '200':
          description: À propos de nous

  /api/public/legal/site-version:
    get:
      tags:
        - Public - Legal
      summary: Version du site
      responses:
        '200':
          description: Version du site

  # ========== PUBLIC FAQ ROUTES ==========
  /api/public/faqs:
    get:
      tags:
        - Public - FAQ
      summary: Lister les FAQs
      responses:
        '200':
          description: Liste des FAQs

  /api/public/faqs/{faqId}:
    get:
      tags:
        - Public - FAQ
      summary: Détails d'une FAQ
      parameters:
        - name: faqId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Détails de la FAQ

  # ========== PUBLIC BLOG ROUTES ==========
  /api/public/blog/posts:
    get:
      tags:
        - Public - Blog
      summary: Lister les articles
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
