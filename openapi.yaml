  /api/public/maintenance-guides/{guideId}:
    get:
      tags:
        - Public - Maintenance Guides
      summary: Détails d'un guide d'entretien
      parameters:
        - name: guideId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Détails du guide

  /api/public/maintenance-guides/category/{categoryId}:
    get:
      tags:
        - Public - Maintenance Guides
      summary: Guides par catégorie
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Guides de la catégorie

  /api/public/maintenance-guides/brand/{brand}:
    get:
      tags:
        - Public - Maintenance Guides
      summary: Guides par marque
      parameters:
        - name: brand
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Guides de la marque

  /api/public/maintenance-guides/product/{productId}:
    get:
      tags:
        - Public - Maintenance Guides
      summary: Guides pour un produit
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Guides du produit

  /api/public/maintenance-guides/search:
    get:
      tags:
        - Public - Maintenance Guides
      summary: Rechercher des guides
      parameters:
        - name: search
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Résultats de recherche

  # ========== PUBLIC LEGAL PAGES ROUTES ==========
