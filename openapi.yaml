  /api/public/legal/privacy-policy:
    get:
      tags:
        - Public - Legal
      summary: Politique de confidentialité
      responses:
        '200':
          description: Politique de confidentialité

  /api/public/legal/legal-notice:
    get:
      tags:
        - Public - Legal
      summary: Mentions légales
      responses:
        '200':
          description: Mentions légales

  /api/public/legal/about-us:
    get:
      tags:
