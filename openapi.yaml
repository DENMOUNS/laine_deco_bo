openapi: 3.0.1
info:
  title: Laine Déco API
  version: 1.0.0
  description: |
    Documentation complète de l'API Laine Déco - Plateforme de vente de laine et accessoires

    ## 🔐 Authentification
    Utilisez un token JWT Bearer dans l'en-tête `Authorization: Bearer <token>`

    ## 📋 Sections de l'API
    - **Public** : Routes accessibles sans authentification
    - **Client** : Routes pour les clients authentifiés
    - **Admin** : Routes pour les administrateurs
    - **Finance** : Routes pour l'équipe finance

  contact:
    name: Support Laine Déco
    email: support@laine-deco.cm
    url: https://laine-deco.cm
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8080
    description: Serveur local
  - url: https://api.laine-deco.cm
    description: Serveur de production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Entrez le token JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          type: object
        refreshToken:
          type: string
        expiresIn:
          type: integer

    ProductResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
        category:
          type: string
        brand:
          type: string
        stock:
          type: integer
        rating:
          type: number
        createdAt:
          type: string
          format: date-time

    OrderResponse:
      type: object
      properties:
        id:
          type: string
        orderNumber:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        items:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time

    CategoryResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        productCount:
          type: integer

    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string

    Page:
      type: object
      properties:
        content:
          type: array
        totalElements:
          type: integer
        totalPages:
          type: integer
        pageNumber:
          type: integer
        pageSize:
          type: integer

security:
  - bearerAuth: []

paths:
  # ========== AUTHENTICATION ROUTES ==========
  /api/auth/signup:
    post:
      tags:
        - Authentication
      summary: Inscription
      description: Créer un nouveau compte utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
      responses:
        '201':
          description: Utilisateur créé avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Données invalides

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Connexion
      description: Authentifier un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Identifiants invalides

  /api/auth/logout:
    post:
      tags:
        - Authentication
      summary: Déconnexion
      description: Déconnecter l'utilisateur actuel
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Déconnexion réussie

  /api/auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Demander réinitialisation de mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: Email de réinitialisation envoyé

  /api/auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Réinitialiser le mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Mot de passe réinitialisé avec succès

  /api/auth/me:
    get:
      tags:
        - Authentication
      summary: Obtenir profil utilisateur
      description: Récupérer les informations de l'utilisateur connecté
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil récupéré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  # ========== PUBLIC PRODUCT ROUTES ==========
  /api/public/products:
    get:
      tags:
        - Public - Products
      summary: Lister les produits
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: keyword
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: string
        - name: brand
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: minRating
          in: query
          schema:
            type: number
        - name: inStockOnly
          in: query
          schema:
            type: boolean
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [NEWEST, PRICE_ASC, PRICE_DESC, RATING, POPULARITY]
      responses:
        '200':
          description: Liste des produits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'

  /api/public/products/{id}:
    get:
      tags:
        - Public - Products
      summary: Détails du produit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Détails du produit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Produit non trouvé

  /api/public/products/{id}/details:
    get:
      tags:
        - Public - Products
      summary: Détails complets du produit avec produits similaires
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Détails complets avec similaires
          content:
            application/json:
              schema:
                type: object

  /api/public/products/by-category/{categoryId}:
    get:
      tags:
        - Public - Products
      summary: Produits par catégorie
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Produits de la catégorie

  /api/public/products/by-brand/{brand}:
    get:
      tags:
        - Public - Products
      summary: Produits par marque
      parameters:
        - name: brand
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Produits de la marque

  /api/public/products/search/keyword:
    get:
      tags:
        - Public - Products
      summary: Recherche par mot-clé
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Résultats de recherche

  /api/public/products/search/popular:
    get:
      tags:
        - Public - Products
      summary: Produits populaires
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Produits populaires

  /api/public/products/search/top-rated:
    get:
      tags:
        - Public - Products
      summary: Produits les mieux notés
      parameters:
        - name: minRating
          in: query
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Produits les mieux notés

  /api/public/products/search/newest:
    get:
      tags:
        - Public - Products
      summary: Nouveaux produits
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Nouveaux produits

  # ========== PUBLIC CATEGORIES ROUTES ==========
  /api/public/categories:
    get:
      tags:
