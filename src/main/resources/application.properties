spring.application.name=laine_deco
spring.datasource.url=jdbc:h2:mem:laine_deco;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

app.auth.jwt-secret=change-this-secret-key-change-this-secret-key
app.auth.access-token-minutes=60
app.auth.remember-me-days=30
app.auth.forgot-password-minutes=20
