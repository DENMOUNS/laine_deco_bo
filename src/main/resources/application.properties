# =================== APPLICATION ===================
spring.application.name=laine_deco

# =================== DATABASE ===================
spring.datasource.url=jdbc:mysql://localhost:3306/laine_deco?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true

# CORRECTION PERFORMANCE : Connection pool HikariCP optimisé pour 500 utilisateurs max
# 500 users / 10 req concurrent max = pool de 20-30 connexions est suffisant
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.pool-name=LaineDeco-HikariPool

spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =================== JPA / HIBERNATE ===================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# PERFORMANCE : Batch pour les inserts/updates groupés
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# PERFORMANCE : Cache de second niveau désactivé (Redis non configuré)
spring.jpa.properties.hibernate.cache.use_second_level_cache=false

# PERFORMANCE : Open-in-view désactivé → pas de connexion DB gardée pendant le rendu de la vue
spring.jpa.open-in-view=false

# =================== AUTH ===================
app.auth.jwt-secret=change-this-secret-key-change-this-secret-key
app.auth.access-token-minutes=60
app.auth.remember-me-days=30
app.auth.forgot-password-minutes=20

# =================== MAIL ===================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=landrymoutongo97@gmail.com
spring.mail.password=Google@*1234
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# PERFORMANCE : Timeout mail pour ne pas bloquer les threads
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000
management.health.mail.enabled=false

# =================== ACTUATOR ===================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# =================== LOGGING ===================
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=WARN
logging.level.cm.dolers=INFO
# Ne pas logger les binders Hibernate (trop verbeux)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# =================== SPRING MVC / ERROR ===================
server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# PERFORMANCE : Compression HTTP
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# PERFORMANCE : Timeout Tomcat
server.tomcat.connection-timeout=20000
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10

# =================== SPRINGDOC / SWAGGER ===================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=false
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json
