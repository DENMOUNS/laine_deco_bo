spring.application.name=laine_deco
spring.datasource.url=jdbc:mysql://localhost:3306/laine_deco?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.auth.jwt-secret=change-this-secret-key-change-this-secret-key
app.auth.access-token-minutes=60
app.auth.remember-me-days=30
app.auth.forgot-password-minutes=20

# Mail configuration (MailHog - Fake SMTP Server)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=

# Disable mail health check to avoid 503
management.health.mail.enabled=false

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true

# SpringDoc OpenAPI Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui-custom.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.api-docs.path=/v3/api-docs
